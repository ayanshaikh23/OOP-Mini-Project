<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Business Ledger – Profile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif; background: #0a0a0f; min-height: 100vh; padding: 1.5rem 1.5rem 6rem; color: #fff; }
  .topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 1.75rem; }
  .back-btn { width: 36px; height: 36px; border-radius: 10px; background: #13131a; border: 0.5px solid rgba(255,255,255,0.08); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
  .back-btn svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.6); }
  .topbar h2 { font-size: 18px; font-weight: 500; }
  .avatar-section { display: flex; flex-direction: column; align-items: center; margin-bottom: 2rem; }
  .avatar-ring { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #6c63ff, #4f46e5); display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: 500; margin-bottom: 12px; border: 3px solid rgba(108,99,255,0.3); }
  .avatar-name { font-size: 18px; font-weight: 500; }
  .avatar-role { font-size: 12px; color: rgba(255,255,255,0.35); margin-top: 3px; }
  .section-label { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.5rem; }
  .info-card { background: #13131a; border: 0.5px solid rgba(255,255,255,0.08); border-radius: 16px; overflow: hidden; }
  .info-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 0.5px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.15s; }
  .info-row:last-child { border-bottom: none; }
  .info-row:hover { background: rgba(255,255,255,0.02); }
  .info-left { display: flex; align-items: center; gap: 12px; }
  .info-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .info-icon svg { width: 15px; height: 15px; }
  .ic-purple { background: rgba(108,99,255,0.12); } .ic-purple svg { fill: #a5a0ff; }
  .ic-teal { background: rgba(93,202,165,0.12); } .ic-teal svg { fill: #5dcaa5; }
  .ic-amber { background: rgba(239,159,39,0.12); } .ic-amber svg { fill: #ef9f27; }
  .ic-coral { background: rgba(216,90,48,0.12); } .ic-coral svg { fill: #d85a30; }
  .ic-blue { background: rgba(55,138,221,0.12); } .ic-blue svg { fill: #378add; }
  .info-label { font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 2px; }
  .info-value { font-size: 14px; }
  .info-value.muted { color: rgba(255,255,255,0.3); font-style: italic; }
  .edit-icon { width: 16px; height: 16px; fill: rgba(255,255,255,0.2); flex-shrink: 0; }
  .edit-section { margin-top: 1.5rem; background: #13131a; border: 0.5px solid rgba(108,99,255,0.25); border-radius: 16px; padding: 1.25rem; display: none; }
  .edit-section.open { display: block; }
  .edit-section h3 { font-size: 13px; font-weight: 500; color: #a5a0ff; margin-bottom: 1rem; }
  .field { margin-bottom: 1rem; }
  .field label { display: block; font-size: 11px; color: rgba(255,255,255,0.35); letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 6px; }
  .field input { width: 100%; background: #0a0a0f; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; padding: 11px 14px; font-size: 14px; color: #fff; outline: none; font-family: inherit; transition: border-color 0.2s; }
  .field input:focus { border-color: rgba(108,99,255,0.5); }
  .field input::placeholder { color: rgba(255,255,255,0.2); }
  .btn-row { display: flex; gap: 10px; margin-top: 1.25rem; }
  .save-btn { flex: 1; padding: 12px; background: #6c63ff; border: none; border-radius: 10px; color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; }
  .cancel-btn { padding: 12px 20px; background: none; border: 0.5px solid rgba(255,255,255,0.1); border-radius: 10px; color: rgba(255,255,255,0.4); font-size: 14px; cursor: pointer; font-family: inherit; }
  .logout-btn { width: 100%; margin-top: 1.5rem; padding: 14px; background: rgba(240,149,149,0.08); border: 0.5px solid rgba(240,149,149,0.2); border-radius: 14px; color: #f09595; font-size: 14px; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.2s; }
  .logout-btn:hover { background: rgba(240,149,149,0.14); }
  .msg { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-top: 1rem; display: none; }
  .msg.success { background: rgba(29,158,117,0.15); border: 0.5px solid rgba(29,158,117,0.3); color: #5dcaa5; }
  .msg.error { background: rgba(226,75,74,0.12); border: 0.5px solid rgba(226,75,74,0.3); color: #f09595; }
</style>
</head>
<body>
<div class="topbar">
  <div class="back-btn" onclick="window.location.href='dashboard.html'">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </div>
  <h2>Profile</h2>
</div>

<div class="avatar-section">
  <div class="avatar-ring" id="avatarEl">?</div>
  <div class="avatar-name" id="ownerName">Loading...</div>
  <div class="avatar-role" id="businessType">Business Owner</div>
</div>

<div class="section-label">Company Details</div>
<div class="info-card">
  <div class="info-row" onclick="openEdit()">
    <div class="info-left">
      <div class="info-icon ic-purple"><svg viewBox="0 0 24 24"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg></div>
      <div><div class="info-label">Company Name</div><div class="info-value" id="dispCompany">—</div></div>
    </div>
    <svg class="edit-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </div>
  <div class="info-row" onclick="openEdit()">
    <div class="info-left">
      <div class="info-icon ic-amber"><svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg></div>
      <div><div class="info-label">Address</div><div class="info-value" id="dispAddress">—</div></div>
    </div>
    <svg class="edit-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </div>
  <div class="info-row" onclick="openEdit()">
    <div class="info-left">
      <div class="info-icon ic-coral"><svg viewBox="0 0 24 24"><path d="M6.62 10.79a15.05 15.05 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.01-.24c1.12.37 2.33.57 3.58.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.61 21 3 13.39 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.46.57 3.58a1 1 0 0 1-.25 1.01l-2.2 2.2z"/></svg></div>
      <div><div class="info-label">Contact Number</div><div class="info-value" id="dispContact">—</div></div>
    </div>
    <svg class="edit-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </div>
  <div class="info-row" onclick="openEdit()">
    <div class="info-left">
      <div class="info-icon ic-blue"><svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg></div>
      <div><div class="info-label">Email</div><div class="info-value" id="dispEmail">—</div></div>
    </div>
    <svg class="edit-icon" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
  </div>
</div>

<div class="edit-section" id="editSection">
  <h3>Edit Company Details</h3>
  <div class="field"><label>Company Name</label><input id="inCompany" placeholder="Company name" /></div>
  <div class="field"><label>Owner Name</label><input id="inOwner" placeholder="Owner name" /></div>
  <div class="field"><label>Address</label><input id="inAddress" placeholder="City, State" /></div>
  <div class="field"><label>Contact Number</label><input id="inContact" placeholder="+91 XXXXX XXXXX" /></div>
  <div class="field"><label>Email</label><input id="inEmail" placeholder="email@company.com" /></div>
  <div class="field"><label>Business Type</label><input id="inBusiness" placeholder="e.g. Contractor, Retailer..." /></div>
  <div class="btn-row">
    <button class="save-btn" onclick="saveProfile()">Save Changes</button>
    <button class="cancel-btn" onclick="closeEdit()">Cancel</button>
  </div>
  <div class="msg" id="msgBox"></div>
</div>

<button class="logout-btn" onclick="handleLogout()">Log Out</button>

<script>
const username = localStorage.getItem('username') || 'User';
document.getElementById('avatarEl').textContent = username.slice(0,2).toUpperCase();

async function loadProfile() {
  try {
    const res = await fetch('http://localhost:3000/profile?username=' + username);
    const data = await res.json();
    document.getElementById('ownerName').textContent = data.ownerName || username;
    document.getElementById('businessType').textContent = data.businessType || 'Business Owner';
    document.getElementById('dispCompany').textContent = data.companyName || '—';
    document.getElementById('dispAddress').textContent = data.address || '—';
    document.getElementById('dispContact').textContent = data.contactNumber || '—';
    document.getElementById('dispEmail').textContent = data.email || '—';
    document.getElementById('inCompany').value = data.companyName || '';
    document.getElementById('inOwner').value = data.ownerName || '';
    document.getElementById('inAddress').value = data.address || '';
    document.getElementById('inContact').value = data.contactNumber || '';
    document.getElementById('inEmail').value = data.email || '';
    document.getElementById('inBusiness').value = data.businessType || '';
  } catch {}
}
loadProfile();

function openEdit() { document.getElementById('editSection').classList.add('open'); }
function closeEdit() { document.getElementById('editSection').classList.remove('open'); }

async function saveProfile() {
  const payload = {
    username,
    companyName: document.getElementById('inCompany').value,
    ownerName: document.getElementById('inOwner').value,
    address: document.getElementById('inAddress').value,
    contactNumber: document.getElementById('inContact').value,
    email: document.getElementById('inEmail').value,
    businessType: document.getElementById('inBusiness').value
  };
  try {
    const res = await fetch('http://localhost:3000/profile', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload) });
    const data = await res.json();
    if (data.success) {
      loadProfile();
      const msg = document.getElementById('msgBox');
      msg.textContent = 'Profile updated successfully!';
      msg.className = 'msg success'; msg.style.display = 'block';
      setTimeout(() => { closeEdit(); msg.style.display = 'none'; }, 1800);
    }
  } catch {
    const msg = document.getElementById('msgBox');
    msg.textContent = 'Cannot connect to server.';
    msg.className = 'msg error'; msg.style.display = 'block';
  }
}

function handleLogout() {
  localStorage.removeItem('username');
  window.location.href = 'login.html';
}
</script>
</body>
</html>
